<body class="bg-background text-on-background font-body-md selection:bg-primary selection:text-on-primary overflow-hidden">

<div class="text-[80px] font-amount-lg text-primary -rotate-12 select-none opacity-50">#FAIR</div>
</div>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.querySelector('input');
            const card = document.querySelector('.bg-\\[\\#F7F3EA\\]');
            
            // Subtle card tilt on hover/focus
            input.addEventListener('focus', () => {
                card.style.transform = 'rotate(0deg) scale(1.02)';
            });
            
            input.addEventListener('blur', () => {
                card.style.transform = 'rotate(1deg) scale(1)';
            });

            // Button click ripple (simple version)
            const btn = document.querySelector('button');
            btn.addEventListener('click', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                let ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                ripple.style.width = '0px';
                ripple.style.height = '0px';
                ripple.style.background = 'rgba(255,255,255,0.3)';
                ripple.style.borderRadius = '50%';
                ripple.style.transform = 'translate(-50%, -50%)';
                ripple.style.transition = 'all 0.6s ease-out';
                btn.appendChild(ripple);
                
                requestAnimationFrame(() => {
                    ripple.style.width = '300px';
                    ripple.style.height = '300px';
                    ripple.style.opacity = '0';
                });
                
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
